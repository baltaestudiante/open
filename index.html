<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Balta Media</title>
    <link rel="icon" type="image/png" href="https://media.baltaanay.org/web/image/885-f3d79ca9/xhbalta-aula.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050505] text-white font-sans antialiased overflow-x-hidden">

<!-- HEADER (sin cambios) -->
<header id="top-header" class="sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between" id="header-container">
        <a href="/" class="flex items-center gap-2" id="root-link">
            <img src="https://media.baltaanay.org/web/image/885-f3d79ca9/xhbalta-aula.png" alt="Balta Media Logo" class="w-6 h-6 sm:w-8 sm:h-8 rounded-lg object-cover">
            <span class="text-lg sm:text-xl font-bold text-white">Balta Media</span>
        </a>

        <!-- Search desktop -->
        <div class="hidden lg:flex items-center gap-4 desktop-search-container">
            <div class="relative">
                <input type="text" id="desktopSearch" placeholder="Buscar episodios, series..." class="bg-white/10 border border-white/20 rounded-full px-4 py-2 pl-10 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="handleDesktopSearchInput(this.value)" onkeypress="if(event.key === 'Enter') handleDesktopSearchEnter(event)" onfocus="showDesktopSearchResults()">
                <img src="https://media.baltaanay.org/web/image/793-902e5b33/Search%20%282%29.png" alt="Buscar" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4">
            </div>
            <div class="desktop-search-results" id="desktopSearchResults">
                <div id="desktopSearchResultsContent"></div>
            </div>
            <a href="/my/home" class="text-sm font-bold text-gray-400 hover:text-white">Iniciar sesión</a>
        </div>

        <div class="flex items-center gap-3 sm:gap-4">
            <button onclick="toggleMobileSearch()" class="lg:hidden text-gray-400 hover:text-white">
                <img src="https://media.baltaanay.org/web/image/793-902e5b33/Search%20%282%29.png" alt="Buscar" class="w-5 h-5">
            </button>
            <a href="/novedades" class="relative text-gray-400 hover:text-white">
                <img src="https://media.baltaanay.org/web/image/796-aee658de/Explore.png" alt="Notificaciones" class="w-5 h-5">
                <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="/my/home" class="w-7 h-7 sm:w-8 sm:h-8 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full overflow-hidden">
                <img src="https://media.baltaanay.org/web/image/793-902e5b33/Search%20%282%29.png" alt="Usuario" class="w-full h-full object-cover">
            </a>
        </div>
    </div>
</header>

<!-- Mobile search bar -->
<div id="mobileSearchBar" class="lg:hidden bg-[#050505] p-4 border-b border-white/10 fixed top-0 left-0 right-0 z-50 transform -translate-y-full transition-transform duration-300">
    <div class="flex items-center gap-3">
        <img src="https://media.baltaanay.org/web/image/793-902e5b33/Search%20%282%29.png" alt="Buscar" class="w-5 h-5">
        <input type="text" id="mobileSearchInput" placeholder="Buscar episodios, series..." class="flex-1 bg-transparent border-none text-white text-base focus:outline-none placeholder-gray-500" oninput="handleMobileSearchInput(this.value)" onkeypress="if(event.key === 'Enter') handleMobileSearchEnter(event)">
        <button onclick="handleMobileSearchButton()" class="text-white px-3 py-1 bg-blue-600 rounded-md text-sm">Buscar</button>
        <button onclick="toggleMobileSearch()" class="text-white text-xl">×</button>
    </div>
    <div id="mobileSearchResults" class="mt-4 max-h-[60vh] overflow-y-auto"></div>
</div>
<div class="search-overlay fixed inset-0 bg-black/80 backdrop-blur-sm z-40 opacity-0 invisible transition-opacity duration-300" id="searchOverlay" onclick="closeSearch()"></div>

<!-- Category filters -->
<div class="sticky top-0 z-40 bg-[#050505]/95 backdrop-blur-xl border-b border-white/5" id="category-filters">
    <div class="py-2 sm:py-3 overflow-x-auto no-scrollbar">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 flex items-center gap-2 sm:gap-3" id="category-pills"></div>
    </div>
</div>

<!-- Main content container -->
<main class="max-w-[1600px] mx-auto px-4 sm:px-6 mt-4 min-h-screen" id="main-container">
    <!-- Las vistas se inyectan aquí dinámicamente -->
</main>

<!-- Modal de error para reproducción -->
<div id="playerErrorModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm opacity-0 invisible transition-opacity duration-300">
    <div class="bg-zinc-900 border border-white/10 rounded-2xl max-w-md w-full mx-4 p-6 shadow-2xl">
        <h3 class="text-xl font-bold text-white mb-2">Reproductor no disponible</h3>
        <p class="text-gray-300 mb-4" id="errorEpisodeName">El episodio no se puede reproducir en este momento.</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-end">
            <a href="https://www.baltaanay.org/contactus" target="_blank" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white text-center text-sm font-semibold transition">Reportar problema</a>
            <a href="https://www.baltaanay.org/solicitar" target="_blank" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-white text-center text-sm font-semibold transition">Solicitar</a>
            <button onclick="closeErrorModal()" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 rounded-lg text-white text-sm font-semibold transition">Cerrar</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="episodios.js"></script>
<script src="homeshow.js"></script>
<script>
// ==================== CONFIGURACIÓN GLOBAL ====================
const ICONS = {
    play: 'https://marca1.odoo.com/web/image/508-f876320c/play.svg',
    add: 'https://marca1.odoo.com/web/image/509-c555b4ef/a%C3%B1adir%20a.svg',
    added: 'https://nikichitonjesus.odoo.com/web/image/1112-d141b3eb/a%C3%B1adido.png',
    dl: 'https://marca1.odoo.com/web/image/510-7a9035c1/descargar.svg',
    noDl: 'https://nikichitonjesus.odoo.com/web/image/1051-622a3db3/no-desc.webp'
};

const CATEGORIES = [
    "Todos", "Derecho", "Física y Astronomía", "Matemáticas", "Historia",
    "Filosofía", "Economía y Finanzas", "Ciencias Sociales", "Arte y Cultura",
    "Literatura y Audiolibros", "Cine y TV", "Documentales", "Ciencias Naturales",
    "Tecnología e Informática", "Otras Ciencias"
];

// Datos de episodios (desde episodios.js)
const DATA = window.processEpisodes ? window.processEpisodes() : [];

// Playlist
const playlistKey = 'streamhub_userPlaylist';
let userPlaylist = JSON.parse(localStorage.getItem(playlistKey)) || [];

function addToUserPlaylist(episodeData) {
    if (!episodeData || !episodeData.mediaUrl) return false;
    const exists = userPlaylist.some(item => item.mediaUrl === episodeData.mediaUrl);
    if (!exists) {
        const playlistItem = {
            mediaUrl: episodeData.mediaUrl,
            mediaType: episodeData.type || episodeData.mediaType || 'audio',
            coverUrlContainer: episodeData.cover || episodeData.coverUrlContainer || episodeData.coverUrl,
            coverUrlInfo: episodeData.cover || episodeData.coverUrlInfo || episodeData.coverUrl,
            title: episodeData.title,
            detailUrl: episodeData.detailUrl || '#',
            author: episodeData.author || 'Desconocido',
            next: [],
            text: episodeData.description || '',
            allowDownload: episodeData.allowDownload !== undefined ? episodeData.allowDownload : true
        };
        userPlaylist.push(playlistItem);
        localStorage.setItem(playlistKey, JSON.stringify(userPlaylist));
        updateAddButtons(episodeData.id || episodeData.mediaUrl);
        return true;
    }
    return false;
}

function updateAddButtons(identifier) {
    document.querySelectorAll(`[data-episode-id="${identifier}"], [data-media-url="${identifier}"]`).forEach(btn => {
        if (btn.tagName === 'IMG') btn.src = ICONS.added;
        btn.dataset.added = 'true';
    });
}

function isInPlaylist(mediaUrl) {
    return userPlaylist.some(item => item.mediaUrl === mediaUrl);
}

// ==================== FUNCIONES DE BÚSQUEDA (igual que antes) ====================
let lastScrollTop = 0;
let searchTimeout = null;

function showDesktopSearchResults() { document.getElementById('desktopSearchResults')?.classList.add('active'); }
function hideDesktopSearchResults() { setTimeout(() => document.getElementById('desktopSearchResults')?.classList.remove('active'), 200); }
function clearDesktopSearchResults() { 
    const cont = document.getElementById('desktopSearchResultsContent');
    if(cont) cont.innerHTML = '';
    document.getElementById('desktopSearchResults')?.classList.remove('active');
}
function clearMobileSearchResults() { document.getElementById('mobileSearchResults').innerHTML = ''; }

function handleDesktopSearchInput(query) {
    clearTimeout(searchTimeout);
    if (!query.trim()) { clearDesktopSearchResults(); return; }
    searchTimeout = setTimeout(() => {
        const results = performQuickSearch(query);
        renderDesktopSearchResults(results, query);
    }, 300);
}
function handleDesktopSearchEnter(e) {
    e.preventDefault();
    const q = document.getElementById('desktopSearch').value.trim();
    if(q) Router.navigate('/buscar?q='+encodeURIComponent(q));
    hideDesktopSearchResults();
}
function performQuickSearch(q) {
    const term = q.toLowerCase().trim();
    return DATA.filter(ep => ep.title.toLowerCase().includes(term) || ep.author.toLowerCase().includes(term) || ep.categories.some(c => c.toLowerCase().includes(term))).slice(0,5);
}
function renderDesktopSearchResults(results, query) {
    const container = document.getElementById('desktopSearchResultsContent');
    if(!container) return;
    if(results.length===0) { container.innerHTML = `<div class="text-center py-4 text-gray-400">No encontramos resultados para "${query}"</div>`; return; }
    container.innerHTML = results.map(ep => `<div class="search-result-item" onclick="goToDetail('${ep.detailUrl}'); event.stopPropagation();">
        <div class="w-12 h-12 rounded-md overflow-hidden"><img src="${ep.cover}" class="w-full h-full object-cover"></div>
        <div><h4 class="font-bold text-sm text-white truncate">${ep.title}</h4><p class="text-xs text-gray-400 truncate">${ep.author}</p></div>
    </div>`).join('');
    container.innerHTML += `<div class="search-result-item mt-2 border-t border-white/10 pt-2" onclick="Router.navigate('/buscar?q='+encodeURIComponent('${query}'))"><span class="text-blue-400 font-bold text-sm">Ver todos los resultados para "${query}"</span></div>`;
}
function handleMobileSearchInput(query) {
    clearTimeout(searchTimeout);
    if(!query.trim()) { clearMobileSearchResults(); return; }
    searchTimeout = setTimeout(() => {
        const results = performQuickSearch(query);
        renderMobileSearchResults(results, query);
    },300);
}
function handleMobileSearchEnter(e) { e.preventDefault(); handleMobileSearch(document.getElementById('mobileSearchInput').value.trim()); }
function handleMobileSearchButton() { handleMobileSearch(document.getElementById('mobileSearchInput').value.trim()); }
function renderMobileSearchResults(results, query) {
    const container = document.getElementById('mobileSearchResults');
    if(!container) return;
    if(results.length===0) { container.innerHTML = `<div class="text-center py-4 text-gray-400">No encontramos resultados para "${query}"</div>`; return; }
    container.innerHTML = results.map(ep => `<div class="search-result-item" onclick="goToDetail('${ep.detailUrl}'); closeSearch();">
        <div class="w-12 h-12 rounded-md overflow-hidden"><img src="${ep.cover}" class="w-full h-full object-cover"></div>
        <div><h4 class="font-bold text-sm text-white truncate">${ep.title}</h4><p class="text-xs text-gray-400 truncate">${ep.author}</p></div>
    </div>`).join('');
    container.innerHTML += `<div class="search-result-item mt-2 border-t border-white/10 pt-2" onclick="handleMobileSearch('${query}')"><span class="text-blue-400 font-bold text-sm">Ver todos los resultados para "${query}"</span></div>`;
}
function toggleMobileSearch() {
    const el = document.getElementById('mobileSearchBar');
    const overlay = document.getElementById('searchOverlay');
    if(el.classList.contains('open')) {
        el.classList.remove('open'); overlay.classList.remove('active');
        document.getElementById('mobileSearchInput').value = '';
        clearMobileSearchResults();
    } else {
        el.classList.add('open'); overlay.classList.add('active');
        document.getElementById('mobileSearchInput').focus();
    }
}
function handleMobileSearch(query) {
    if(query) Router.navigate('/buscar?q='+encodeURIComponent(query));
    closeSearch();
}
function closeSearch() {
    document.getElementById('mobileSearchBar')?.classList.remove('open');
    document.getElementById('searchOverlay')?.classList.remove('active');
    clearDesktopSearchResults(); clearMobileSearchResults();
}

// ==================== FUNCIONES DE REPRODUCCIÓN SEGURA ====================
function safePlayEpisode(episodeData) {
    if (typeof window.playEpisodeExpanded === 'function') {
        try {
            window.playEpisodeExpanded(
                episodeData.mediaUrl,
                episodeData.type || 'audio',
                episodeData.cover || episodeData.coverUrlContainer,
                episodeData.cover || episodeData.coverUrlInfo,
                episodeData.title,
                episodeData.detailUrl || '#',
                episodeData.author || 'Desconocido',
                episodeData.next || [],
                episodeData.description || episodeData.text || '',
                episodeData.allowDownload !== undefined ? episodeData.allowDownload : true
            );
        } catch (e) {
            showPlayerError(episodeData.title);
        }
    } else {
        showPlayerError(episodeData.title);
    }
}

function showPlayerError(episodeTitle) {
    const modal = document.getElementById('playerErrorModal');
    const nameSpan = document.getElementById('errorEpisodeName');
    if (nameSpan) nameSpan.innerText = `"${episodeTitle}" no está disponible.`;
    if (modal) {
        modal.classList.remove('opacity-0', 'invisible');
        modal.classList.add('opacity-100', 'visible');
    }
}
function closeErrorModal() {
    const modal = document.getElementById('playerErrorModal');
    modal.classList.add('opacity-0', 'invisible');
    modal.classList.remove('opacity-100', 'visible');
}

// Handlers existentes (adaptados para usar safePlayEpisode)
function handlePlay(e, id) {
    e.stopPropagation(); e.preventDefault();
    const ep = DATA.find(x => x.id == id);
    if (ep) safePlayEpisode(ep);
    return false;
}
function handleAdd(e, id) {
    e.stopPropagation(); e.preventDefault();
    const ep = DATA.find(x => x.id == id);
    const agregado = addToUserPlaylist({
        mediaUrl: ep.mediaUrl, type: ep.type, cover: ep.cover, title: ep.title,
        detailUrl: ep.detailUrl, author: ep.author, description: ep.description,
        allowDownload: ep.allowDownload, id: ep.id
    });
    if (agregado) {
        const btn = e.target.closest('img') || e.target;
        if(btn.tagName==='IMG') btn.src = ICONS.added;
        btn.dataset.added = 'true';
    }
}
function handleDl(e, id) {
    e.stopPropagation(); e.preventDefault();
    const ep = DATA.find(x => x.id == id);
    if (!ep.allowDownload) { alert('Descarga no disponible'); return false; }
    const a = document.createElement('a');
    a.href = ep.mediaUrl;
    a.download = `${ep.title.replace(/[^a-z0-9]/gi,'_')}.${ep.type==='video'?'mp4':'mp3'}`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => { if(!a.href.startsWith('blob:')) window.open(ep.mediaUrl,'_blank'); }, 1000);
    return false;
}
window.handlePlay = handlePlay;
window.handleAdd = handleAdd;
window.handleDl = handleDl;

// ==================== PÁGINAS REGISTRADAS ====================
const pages = [
    { title: 'Biblioteca', url: '/biblioteca', script: 'biblioteca.js', header: true },
    { title: 'Explorar', url: '/explorar', script: 'explorar.js', header: true },
    // Añade más páginas aquí
];

const loadedScripts = new Set();

function loadPageScript(scriptName) {
    return new Promise((resolve, reject) => {
        if (loadedScripts.has(scriptName)) {
            // El script ya debería haberse registrado, pero forzamos espera
            if (window.pageModules && window.pageModules[scriptName]) return resolve(window.pageModules[scriptName]);
            // Si no está registrado, esperamos un poco (podría estar cargándose)
            const checkExist = setInterval(() => {
                if (window.pageModules && window.pageModules[scriptName]) {
                    clearInterval(checkExist);
                    resolve(window.pageModules[scriptName]);
                }
            }, 50);
            setTimeout(() => { clearInterval(checkExist); reject(new Error('Timeout cargando script')); }, 3000);
            return;
        }
        const script = document.createElement('script');
        script.src = scriptName;
        script.onload = () => {
            loadedScripts.add(scriptName);
            // Esperar a que el script se registre (puede hacerlo inmediatamente)
            const checkRegister = setInterval(() => {
                if (window.pageModules && window.pageModules[scriptName]) {
                    clearInterval(checkRegister);
                    resolve(window.pageModules[scriptName]);
                }
            }, 20);
            setTimeout(() => { clearInterval(checkRegister); reject(new Error('Script no se registró')); }, 2000);
        };
        script.onerror = reject;
        document.head.appendChild(script);
    });
}

// Registro de módulos de página (cada script debe llamar a esta función)
window.registerPage = (scriptName, module) => {
    if (!window.pageModules) window.pageModules = {};
    window.pageModules[scriptName] = module;
};

// ==================== ENRUTADOR SPA ====================
const Router = {
    init() {
        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (!link) return;
            const href = link.getAttribute('href');
            if (!href || href.startsWith('http') || href.startsWith('//') || href.startsWith('#')) return;
            e.preventDefault();
            this.navigate(href);
        });
        window.addEventListener('popstate', () => this.renderPath());
        this.renderPath();
    },
    navigate(path) {
        history.pushState({}, '', path);
        this.renderPath();
    },
    async renderPath() {
        const fullPath = window.location.pathname + window.location.search;
        const [path, query] = fullPath.split('?');
        const params = new URLSearchParams(query);
        const container = document.getElementById('main-container');
        container.innerHTML = ''; // Limpiar

        // 1. Verificar si es una página registrada
        const page = pages.find(p => p.url === path);
        if (page) {
            // Control de header
            document.getElementById('top-header').style.display = page.header ? 'flex' : 'none';
            document.getElementById('category-filters').style.display = page.header ? 'block' : 'none';
            try {
                const mod = await loadPageScript(page.script);
                if (mod && mod.render) mod.render(container);
                document.title = page.title + ' | Balta Media';
            } catch {
                this.show404();
            }
            return;
        }

        // Mostrar header por defecto
        document.getElementById('top-header').style.display = 'flex';
        document.getElementById('category-filters').style.display = 'block';

        // 2. Búsqueda
        if (path === '/buscar') {
            const q = params.get('q');
            if (q) {
                const results = DATA.filter(ep => 
                    ep.title.toLowerCase().includes(q.toLowerCase()) ||
                    ep.author.toLowerCase().includes(q.toLowerCase()) ||
                    ep.categories.some(c => c.toLowerCase().includes(q.toLowerCase()))
                );
                window.homeshow.renderGrid(container, results, `Resultados para "${q}"`);
                document.title = `Búsqueda: ${q} | Balta Media`;
            } else this.navigate('/');
            return;
        }

        // 3. Categoría
        if (path.startsWith('/categoria/')) {
            const cat = decodeURIComponent(path.replace('/categoria/', ''));
            if (CATEGORIES.includes(cat)) {
                const results = DATA.filter(ep => ep.categories.includes(cat));
                window.homeshow.renderGrid(container, results, cat);
                document.title = cat + ' | Balta Media';
                renderCategoryPills(cat);
            } else this.show404();
            return;
        }

        // 4. Novedades
        if (path === '/novedades') {
            const sorted = [...DATA].sort((a,b) => new Date(b.date) - new Date(a.date));
            const combined = [...new Set([...sorted.slice(0,20), ...DATA.sort(()=>0.5-Math.random()).slice(0,10)])];
            window.homeshow.renderGrid(container, combined, 'Novedades y Recomendaciones');
            document.title = 'Novedades | Balta Media';
            return;
        }

        // 5. Serie (por url_serie)
        const seriesEpisodes = DATA.filter(ep => ep.series && ep.series.url_serie === path);
        if (seriesEpisodes.length > 0) {
            window.homeshow.renderSeries(container, seriesEpisodes);
            document.title = seriesEpisodes[0].series.titulo_serie + ' | Balta Media';
            return;
        }

        // 6. Episodio individual
        const episode = DATA.find(ep => ep.detailUrl === path);
        if (episode) {
            window.homeshow.renderEpisode(container, episode);
            document.title = episode.title + ' | Balta Media';
            return;
        }

        // 7. Raíz (feed)
        if (path === '/' || path === '') {
            window.homeshow.renderFeed(container);
            document.title = 'Balta Media';
            renderCategoryPills('Todos');
            return;
        }

        // 8. No encontrado
        this.show404();
    },
    show404() {
        document.getElementById('top-header').style.display = 'flex';
        document.getElementById('category-filters').style.display = 'block';
        loadPageScript('404.js').then(mod => mod.render(document.getElementById('main-container')))
            .catch(() => document.getElementById('main-container').innerHTML = '<div class="text-center py-20 text-4xl">404</div>');
        document.title = 'Página no encontrada | Balta Media';
    }
};

// ==================== FUNCIONES AUXILIARES ====================
function renderCategoryPills(activeCat = 'Todos') {
    const container = document.getElementById('category-pills');
    if (!container) return;
    container.innerHTML = '';
    CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `whitespace-nowrap px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-xs font-bold transition-all ${cat === activeCat ? 'bg-white text-black' : 'bg-white/10 text-gray-300 hover:bg-white/20'}`;
        btn.innerText = cat;
        btn.onclick = () => Router.navigate('/categoria/' + encodeURIComponent(cat));
        container.appendChild(btn);
    });
}
function filterByCategory(cat) { Router.navigate('/categoria/' + encodeURIComponent(cat)); }
window.filterByCategory = filterByCategory;
window.goToDetail = (url) => { if(url && url!=='#') Router.navigate(url); };

// Inicialización
document.addEventListener('DOMContentLoaded', () => {
    renderCategoryPills();
    Router.init();
});

// Scroll header (igual)
window.addEventListener('scroll', () => {
    const st = window.pageYOffset || document.documentElement.scrollTop;
    const topHeader = document.getElementById('top-header');
    const mobileSearch = document.getElementById('mobileSearchBar');
    if (!topHeader || !mobileSearch) return;
    if (st > lastScrollTop && st > 100) {
        topHeader.style.opacity = '0'; topHeader.style.pointerEvents = 'none';
        mobileSearch.style.opacity = '0'; mobileSearch.style.pointerEvents = 'none';
    } else {
        topHeader.style.opacity = '1'; topHeader.style.pointerEvents = 'auto';
        mobileSearch.style.opacity = '1'; mobileSearch.style.pointerEvents = 'auto';
    }
    lastScrollTop = st <= 0 ? 0 : st;
}, false);
</script>
</body>
</html>
